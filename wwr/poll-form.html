<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>User Poll - Whitewater Rafting</title>
    <link rel="stylesheet" href="styles/styles.css"> 
</head>
<body>
    <header class="site-header">
        <h1>Whitewater Rafting | User Poll</h1>
    </header>
    
    <main>
        <form action="submit-poll" method="post">
            <!-- Contact Information Section -->
            <fieldset>
                <legend>Contact Information</legend>
                
                <label for="fullname">Full Name:</label>
                <input type="text" id="fullname" name="fullname" required placeholder="John Doe">
                
                <label for="useremail">Email:</label>
                <input type="email" id="useremail" name="useremail" required placeholder="john.doe@example.com">
            </fieldset>
            
            <!-- Questions Section -->
            <fieldset>
                <legend>Questions</legend>
                
                <label for="browser">What is your favorite internet browser?</label>
                <select id="browser" name="browser" required>
                    <option value="chrome">Chrome</option>
                    <option value="firefox">Firefox</option>
                    <option value="safari">Safari</option>
                    <option value="edge">Edge</option>
                    <option value="brave">Brave</option>
                    <option value="other">Other</option>
                </select>

                <label for="pet">Do you have a household pet?</label>
                <input type="checkbox" id="pet" name="pet">
                
                <label for="feedback">List the places you have lived:</label>
                <textarea id="feedback" name="feedback" rows="4" placeholder="Stillwater, Florida; Amsterdam, Netherlands; Timbuktu, Mali"></textarea>
            </fieldset>
            
            <!-- Submit Button -->
            <button type="submit">Submit Poll</button>
        </form>
    </main>

    <footer>
        <p>&copy; 2025 Whitewater Rafting Adventures | Your Name</p>
    </footer>
</body>
</html>
